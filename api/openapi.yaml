openapi: 3.0.3
info:
  title: POI Admin API
  version: 1.0.0
  description: |
    JSON API for the POI database (for .NET MAUI app).

    Auth: send header `X-API-Key`.
servers:
  - url: http://localhost/POI_Admin/api
    description: XAMPP local (pretty URLs via .htaccess)
  - url: http://localhost/POI_Admin/api/index.php
    description: Fallback (no rewrite)

tags:
  - name: Health
  - name: POIs

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Error:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    Poi:
      type: object
      properties:
        id:
          type: string
          example: poi_01
        name:
          type: string
          example: Cổng chào Khu du lịch
        description:
          type: string
          nullable: true
        lat:
          type: number
          format: double
          example: 10.762622
        lng:
          type: number
          format: double
          example: 106.660172

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Health check
      responses:
        '200':
          description: OK

  /pois:
    get:
      tags: [POIs]
      summary: List POIs
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Search by id/name/description
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Poi' }

    post:
      tags: [POIs]
      summary: Create POI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name, lat, lng]
              properties:
                id: { type: string }
                name: { type: string }
                description: { type: string, nullable: true }
                lat: { type: number, format: double }
                lng: { type: number, format: double }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: string }

  /pois/{id}:
    get:
      tags: [POIs]
      summary: Get POI by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data: { $ref: '#/components/schemas/Poi' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    put:
      tags: [POIs]
      summary: Update POI
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, lat, lng]
              properties:
                name: { type: string }
                description: { type: string, nullable: true }
                lat: { type: number, format: double }
                lng: { type: number, format: double }
      responses:
        '200':
          description: OK

    delete:
      tags: [POIs]
      summary: Delete POI
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
